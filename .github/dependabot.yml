version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps

  - package-ecosystem: npm
    directory: /examples/react-router-saas
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
